services:
    # Demo App (Backend/Frontend)
  app:
    build: ./docker/app
    container_name: demo_app
    restart: always
    cpus: "0.50"
    mem_limit: 128m
    networks:
      - devops_net

  postgres:
    image: postgres:15
    container_name: demo_db
    restart: always
    cpus: "1.00"
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - devops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: reverse_proxy
    restart: always
    cpus: "0.50"
    mem_limit: 128m
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - devops_net
        
volumes:
  db_data:

networks:
  devops_net:
    driver: bridge