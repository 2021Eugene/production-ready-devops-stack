services:
    # Demo App (Backend/Frontend)
  app:
    image: traefik/whoami
    container_name: demo_app
    restart: always
    networks:
      - devops_net

  postgres:
    image: postgres:15
    container_name: demo_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - devops_net

  nginx:
    image: nginx:latest
    container_name: reverse_proxy
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - devops_net
        
volumes:
  db_data:

networks:
  devops_net:
    driver: bridge